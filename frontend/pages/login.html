<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SDGconnect</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    /* Specific styles for the login page */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, rgba(0, 102, 204, 0.1) 0%, rgba(76, 175, 80, 0.1) 100%);
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 0 20px;
    }
    .login-card {
      background-color: var(--neutral-white);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-md);
      padding: 40px;
      text-align: center;
    }
    .login-logo {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-blue);
      margin-bottom: 30px;
      display: inline-block;
    }
    .login-logo span {
      color: var(--secondary-green);
    }
    .login-subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .forgot-password {
      display: block;
      margin-top: 15px;
      font-size: 0.85rem;
      text-align: right;
    }
    .register-link {
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">SDG<span>connect</span></div>
      <p class="login-subtitle">Sign in to continue connecting and collaborating for sustainability.</p>
      
      <form action="events.html" method="GET">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
      </form>
      
      <a href="#" class="forgot-password">Forgot Password?</a>
      
      <div class="register-link">
        Don't have an account? <a href="#">Register here</a>
      </div>
    </div>
  </div>

</body>
</html>
